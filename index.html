<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ka Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="terminal-container">
        <div id="ka-button" class="artifact" data-src="KaToucheButton.svg"></div>
        <div id="thoth-button" class="artifact" data-src="thoth-chip-logo.svg"></div>
        <div id="duamutef-button" class="artifact" data-src="duamatef-jar.svg"></div>
        <div id="seshat-button" class="artifact" data-src="SeshatAnimation.svg"></div>
        <div id="seshat-panel-button" class="artifact">
            <div class="scp-icon">
                <svg viewBox="0 0 60 70" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <!-- three mixer sliders -->
                    <line x1="8"  y1="22" x2="52" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="20" cy="22" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="20" cy="22" r="2" fill="currentColor"/>

                    <line x1="8"  y1="38" x2="52" y2="38" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="36" cy="38" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="36" cy="38" r="2" fill="currentColor"/>

                    <line x1="8"  y1="54" x2="52" y2="54" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="26" cy="54" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                    <circle cx="26" cy="54" r="2" fill="currentColor"/>

                    <!-- seshat star above -->
                    <polygon points="30,2 31.8,7.5 37.5,7.5 32.9,10.9 34.7,16.4 30,13 25.3,16.4 27.1,10.9 22.5,7.5 28.2,7.5"
                             fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="scp-label">SESHAT<br>CTRL</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
